<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#e94560">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Remote Control</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ============ Setup Screen ============ -->
<div id="setup-screen" class="setup-screen">
    <div class="setup-card">
        <div class="setup-logo">🎮</div>
        <h1>Remote Control</h1>
        <p class="subtitle">Connect to Azure Web PubSub</p>
        <div class="instructions">
            <ol>
                <li>Generate a <strong>Client Access URL</strong> from your Azure Web PubSub service.</li>
                <li>The URL starts with <code>wss://</code> and contains an access token.</li>
                <li>Paste it below and tap <strong>Connect</strong>.</li>
            </ol>
        </div>
        <div class="field-group">
            <label for="setup-url">Client Access URL</label>
            <input id="setup-url" type="url" placeholder="wss://your-service.webpubsub.azure.com/..." autocomplete="off" autocapitalize="off" spellcheck="false">
        </div>
        <button id="setup-connect" class="btn-action primary" style="width:100%">Connect</button>
    </div>
</div>

<!-- ============ Timer Bar ============ -->
<div class="timer-bar">
    <div class="timer-controls">
        <button id="timer-play-pause" class="timer-btn" aria-label="Play/Pause">▶</button>
        <button id="timer-reset" class="timer-btn" aria-label="Reset">↺</button>
    </div>
    <div id="timer-display" class="timer-display">00:00</div>
    <div class="timer-bar-right">
        <span id="status-dot" class="status-dot" title="Connection status"></span>
        <button id="gear-btn" class="gear-btn" aria-label="Settings">⚙️</button>
    </div>
</div>

<!-- ============ Main Content ============ -->
<div class="main-content">
    <div id="mode-tabs" class="mode-tabs"></div>
    <div id="commands-area" class="commands-area"></div>
</div>

<!-- ============ Settings Overlay ============ -->
<div id="settings-overlay" class="overlay">
    <div class="overlay-panel">
        <div class="overlay-title">
            Settings
            <button id="settings-close" class="overlay-close" aria-label="Close">&times;</button>
        </div>

        <!-- Connection -->
        <div class="field-group">
            <label for="settings-url">Client Access URL</label>
            <input id="settings-url" type="url" placeholder="wss://..." autocomplete="off" autocapitalize="off" spellcheck="false">
        </div>
        <div class="btn-row">
            <button id="settings-url-save" class="btn-action primary">Save &amp; Reconnect</button>
            <button id="settings-disconnect" class="btn-action secondary">Disconnect</button>
        </div>

        <!-- Timer Settings -->
        <div class="timer-settings-section">
            <label style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:8px;display:block;">Timer</label>
            <div class="timer-mode-toggle">
                <button id="timer-mode-stopwatch" class="active">⏱ Stopwatch</button>
                <button id="timer-mode-countdown">⏳ Countdown</button>
            </div>
            <div id="countdown-section" class="countdown-inputs hidden">
                <input id="countdown-h" type="number" min="0" max="23" value="0" aria-label="Hours">
                <span>h</span>
                <input id="countdown-m" type="number" min="0" max="59" value="5" aria-label="Minutes">
                <span>m</span>
                <input id="countdown-s" type="number" min="0" max="59" value="0" aria-label="Seconds">
                <span>s</span>
            </div>
            <button id="timer-start-btn" class="btn-action primary" style="width:100%">Start Timer</button>
        </div>

        <hr class="separator">

        <!-- Data Management -->
        <label style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:8px;display:block;">Data</label>
        <div class="btn-row">
            <button id="settings-export" class="btn-action secondary">Export Config</button>
            <label class="btn-action secondary" style="text-align:center;cursor:pointer;">
                Import Config
                <input id="settings-import-file" type="file" accept=".json" style="display:none;">
            </label>
        </div>
        <div class="btn-row mt-12">
            <button id="settings-clear" class="btn-action danger">Clear All Data</button>
        </div>
    </div>
</div>

<!-- ============ Custom Command Dialog ============ -->
<div id="custom-dialog" class="custom-dialog">
    <div class="custom-dialog-panel">
        <div class="overlay-title">
            Custom Command
            <button id="custom-dialog-close" class="overlay-close" aria-label="Close">&times;</button>
        </div>
        <div class="field-group">
            <label for="custom-label">Label</label>
            <input id="custom-label" type="text" placeholder="e.g. Next Track">
        </div>
        <div class="field-group">
            <label for="custom-action">Action (command name)</label>
            <input id="custom-action" type="text" placeholder="e.g. nextTrack">
        </div>
        <div class="field-group">
            <label for="custom-icon">Icon (emoji)</label>
            <input id="custom-icon" type="text" placeholder="🔘" maxlength="4">
        </div>
        <div class="btn-row">
            <button id="custom-save" class="btn-action primary">Save</button>
            <button id="custom-delete" class="btn-action danger hidden">Delete</button>
        </div>
    </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
